name: build-shorts

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Restore YouTube token
        run: |
          mkdir -p state
          echo "$YT_TOKEN" > state/yt_token.json
        env:
          YT_TOKEN: ${{ secrets.YT_TOKEN }}
      - name: Run pipeline
        run: python main.py
        env:
          LLM_PROVIDER: claude
          DATA_PROVIDER: football_data
          TTS_PROVIDER: piper
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FOOTBALLDATA_TOKEN: ${{ secrets.FOOTBALLDATA_TOKEN }}
      - name: Persist dedupe log
        if: always()
        run: |
          git config user.name "shorts-bot"
          git config user.email "bot@users.noreply.github.com"