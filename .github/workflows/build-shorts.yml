name: build-shorts

# Runs HOURLY so post-match recaps go out while results are fresh.
# Use a PUBLIC repo for unlimited free Actions minutes (keys stay safe as Secrets).
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Restore YouTube token
        run: |
          mkdir -p state
          echo "$YT_TOKEN" > state/yt_token.json
        env:
          YT_TOKEN: ${{ secrets.YT_TOKEN }}
      - name: Run pipeline
        run: python main.py
        env:
          LLM_PROVIDER: gemini
          DATA_PROVIDER: api_sports
          TTS_PROVIDER: elevenlabs
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          APISPORTS_KEY: ${{ secrets.APISPORTS_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          TTS_VOICE_ID: ${{ secrets.TTS_VOICE_ID }}
      - name: Persist dedupe log
        if: always()
        run: |
          git config user.name "shorts-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state/posted.json || true
          git commit -m "update posted log [skip ci]" || echo "nothing to commit"
          git push || echo "nothing to push"
